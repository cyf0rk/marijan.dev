baseURL: "https://marijan.dev/"
title: Marijan Batarilo
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: Marijan Batarilo
  description: "I build systems, then break them. Software engineering, cloud, and application security - case studies, writeups, and tooling."
  keywords: [Software Engineering, Application Security, Cloud Engineering, Ecommerce]
  DateFormat: "January 2, 2006"
  defaultTheme: auto # dark, light
  disableThemeToggle: false
  mainSections: ["posts", "work", "lab"]

  ShowReadingTime: false
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: false
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  assets:
    # disableHLJS: true # to disable highlight.js
    # disableFingerprinting: true
    favicon: "<link / abs url>"
    favicon16x16: "<link / abs url>"
    favicon32x32: "<link / abs url>"
    apple_touch_icon: "<link / abs url>"
    safari_pinned_tab: "<link / abs url>"

  label:
    text: "cyf0rk"
    icon: /apple-touch-icon.png
    iconHeight: 10

  socialIcons:
    - name: linkedin
      url: "https://linkedin.com/in/marijan-batarilo/"
    - name: instagram
      url: "https://www.instagram.com/marijan.dev/"
    - name: github
      url: "https://github.com/cyf0rk"

  cover:
    hidden: true # hide everywhere but not in structured data
    hiddenInList: true # hide on list pages and home
    hiddenInSingle: true # hide on single page

  # for search
  # https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
    keys: ["title", "permalink", "summary", "content"]
pagination:
  pagerSize: 5
menu:
  main:
    - identifier: work
      name: work
      url: /work/
      weight: 10
    - identifier: lab
      name: lab
      url: /lab/
      weight: 20
    - identifier: now
      name: now
      url: /now/
      weight: 30
    - identifier: about
      name: about
      url: /about/
      weight: 40
    - identifier: contact
      name: contact
      url: /contact/
      weight: 50
frontmatter:
  lastmod: ["lastmod", ":fileModTime", ":default"]
# Read: https://github.com/adityatelange/hugo-PaperMod/wiki/FAQs#using-hugos-syntax-highlighter-chroma
pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false
    # anchorLineNos: true
    # codeFences: true
    # guessSyntax: true
    lineNos: true
    style: rose-pine
